<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- SEO Meta Tags -->
    <meta name="description" content="Manuel Miguel Miguel - Ingeniero en Sistemas especializado en desarrollo fullstack, QA automation y seguridad informática. Python, JavaScript, C#, Django, Angular, NestJS." />
    <meta name="keywords" content="Manuel Miguel, desarrollador fullstack, QA automation, ingeniero sistemas Guatemala, Python developer, JavaScript developer, Angular, NestJS, Django, PostgreSQL, SQL Server, seguridad informática" />
    <meta name="author" content="Manuel Miguel Miguel" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://miguemi.github.io/" />
    <meta property="og:title" content="Manuel Miguel - Ingeniero en Sistemas | Fullstack Developer & QA" />
    <meta property="og:description" content="Desarrollador fullstack especializado en Python, JavaScript, C# y QA Automation. MSc. en Seguridad Informática. Disponible para nuevas oportunidades." />
    <meta property="og:image" content="https://miguemi.github.io/images/mmm.jpg" />
    <meta property="og:locale" content="es_GT" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://miguemi.github.io/" />
    <meta name="twitter:title" content="Manuel Miguel - Ingeniero en Sistemas | Fullstack Developer & QA" />
    <meta name="twitter:description" content="Desarrollador fullstack especializado en Python, JavaScript, C# y QA Automation. MSc. en Seguridad Informática." />
    <meta name="twitter:image" content="https://miguemi.github.io/images/mmm.jpg" />

    <!-- Additional SEO -->
    <link rel="canonical" href="https://miguemi.github.io/" />
    <meta name="theme-color" content="#1f2937" />

    <!-- Theme Script - Prevents Flash -->
    <script>
      (function() {
        const theme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
